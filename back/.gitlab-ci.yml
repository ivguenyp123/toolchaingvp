check-merge:
  stage: .post
  variables:
    GIT_STRATEGY: none
  script:
    - echo "🔍 Checking if merge request can be merged..."
    - |
      if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then
        echo "📌 Pipeline triggered by merge request event - checking mergeability"
        
        if [ "$FORCE_DEV_DEPLOY" != "false" ]; then
          echo "❌ Merge request has not been approved - cannot merge : FORCE_DEV_DEPLOY is not set to false"
          exit 1
        fi

        echo "🔍 Native Image verification configuration..."
        echo "📊 JAVA_NATIVE_BUILD actuel= ${JAVA_NATIVE_BUILD}"
        if [ "${JAVA_NATIVE_BUILD}" = "false" ]; then
          echo "⚠️  WARNING: JAVA_NATIVE_BUILD is set to 'false'"
          echo "💡 This configuration is not allowed for a production deployment, but the pipeline will continue."
          echo "🔧 Please set JAVA_NATIVE_BUILD=true to enable native compilation."
        else
          echo "✅ Native Image configuration validated: ${JAVA_NATIVE_BUILD}"
          echo "🚀 The deployment is correctly using native compilation"
        fi
        
        echo "✅ Merge request is approved and can be merged"
      else
        echo "📌 Pipeline not triggered by merge request event - skipping merge check"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never
