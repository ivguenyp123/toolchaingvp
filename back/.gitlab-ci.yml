spec:
  inputs:
    namespace:
      type: string
      description: "Namespace de déploiement, dépend du projet (ex: eer, baq). OBLIGATOIRE."
    sonar_project_code:
      type: string
      description: "Code projet pour l'analyse SonarQube (ex: eparbaq-05502-metier). OBLIGATOIRE."
---
default:
  before_script:
    - eval "GCP_PROJECT_ID=\$LCL_CI_${CI_PROJECT_NAMESPACE_ID}_PROJECT_ID"
    - eval "GCP_PREV_PROJECT_ID=\$LCL_CI_${CI_PROJECT_NAMESPACE_ID}_PREV_PROJECT_ID"
  interruptible: true
  image: gcr.io/cloud-builders/gcloud
  tags:
    - easypart-dev

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

include:
  - local: 'component/trivy-scan.yml'
  
variables:
  IMAGE_NAME: "$CI_PROJECT_NAME"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  GCP_MAVEN_DOMAIN: "europe-maven.pkg.dev"
  PACK_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/buildpacksio/pack:0.40.7
  BP_BUILDER_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/paketobuildpacks/builder-jammy-tiny:0.0.504
  BP_RUN_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/paketobuildpacks/run-jammy-tiny:0.2.141
  BP_REBASE_RUN_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/paketobuildpacks/run-jammy-tiny
  BP_LIFECYCLE_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/buildpacksio/lifecycle:0.21.9
  NATIVE_BUILD_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/bellsoft/liberica-native-image-kit-container:jdk-21-nik-23-glibc
  NATIVE_RUN_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/paketobuildpacks/run-jammy-tiny:0.2.141
  CLOUD_SDK_IMAGE: gcr.io/google.com/cloudsdktool/cloud-sdk:slim # gcloud + curl for .deployed
  # Segment projet du registre gcrane : surchargé par chaque job promote (registre de l'env cible).
  GCRANE_REGISTRY_PROJECT: lcl-easypart-dev-73
  # Image gcrane pour .promote — variante -debug (shell busybox requis par l'exécuteur k8s de GitLab).
  # Le segment projet est variabilisé → chemin + tag définis une seule fois ici.
  GCRANE_IMAGE: europe-docker.pkg.dev/${GCRANE_REGISTRY_PROJECT}/docker/gcr.io/go-containerregistry/gcrane:v0.21.6-debug
  DEPLOY_TOOLS_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker/deploy-tools:v1 # Multi-tool image (flux + kustomize + jq), built by the cicd-gcp root pipeline (component/deploy-tools).
  COSIGN_IMAGE: gcr.io/projectsigstore/cosign:v2.4.1
  MAVEN_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/maven:3.9-amazoncorretto-21-debian
  TRIVY_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/aquasec/trivy:0.69.0
  SONAR_IMAGE: lcl-commun-docker-stable-intranet.registry.saas.cagip.group.gca/ci-runner4gitlab:5.6-alpine-allinone
  # Application properties
  NAMESPACE: "$[[ inputs.namespace ]]" # Namespace for deployment (input obligatoire)
  SONAR_PROJECT_CODE: "$[[ inputs.sonar_project_code ]]" # Project code for SonarQube analysis (input obligatoire)
  JAVA_VERSION: "21"
  APPLICATION_BASE_PATH: ""
  BP_MAVEN_BUILT_MODULE: "."
  MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS: ""
  MAVEN_TEST_ADDITIONAL_BUILD_ARGUMENTS: ""
  # Build and deployment control flags
  FORCE_DEV_DEPLOY: "false"
  JAVA_NATIVE_BUILD: "true"
  JAVA_NATIVE_DYNATRACE: "false"
  BLOCKING_TRIVY_SCAN: "true"
  RUNNER_GENERATE_ARTIFACTS_METADATA: "true"
  # Image officielle zricethezav/gitleaks épinglée par DIGEST (via mirror GCP).
  # ⚠️ Digest fourni par Gemini dans la story → À VÉRIFIER qu'il correspond bien
  #    à v8.30.1 sur le registre GCP avant mise en prod (sinon le pull échoue).
  GITLEAKS_IMAGE: europe-docker.pkg.dev/lcl-easypart-dev-73/docker-hub-mirror/zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f # v8.30.1

stages:
  - build
  - test
  - quality
  - deploy  

# Template pour normaliser APPLICATION_BASE_PATH
.normalize-base-path: &normalize_base_path
  - |
    if [ -n "${APPLICATION_BASE_PATH}" ]; then
      export NORMALIZED_BASE_PATH="${APPLICATION_BASE_PATH%/}/"
    else
      export NORMALIZED_BASE_PATH=""
    fi
    echo "✅ Base path normalized: '${APPLICATION_BASE_PATH}' -> '${NORMALIZED_BASE_PATH}'"

# Template pour gérer le profil maven natif
.manage-native-maven-profile: &manage_native_maven_profile
  - |
    if [ "${JAVA_NATIVE_BUILD}" == "true" ] && [ "${JAVA_NATIVE_DYNATRACE}" != "true" ]; then
      echo "🔧 Enabling Maven native profile for native image build"
      export MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS="-Pnative ${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS}"
    else
      echo "🔧 Native image build not requested, skipping native profile activation"
    fi
    echo "✅ Maven profile set: '${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS}' -> '${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS}'"

.build-rules: &build_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

.build:
  <<: *build_rules

.cache:
  cache:
    key: "${CI_PIPELINE_ID}-${CI_COMMIT_REF_SLUG}"
    paths:
    - .m2/repository
    policy: pull

# Template pour factoriser l'authentification Maven
.maven-auth-setup: &maven_auth_setup
  - |
    if [ ! -f "maven-certificates.pem" ]; then
      echo "❌ maven-certificates.pem not found from prepare-config job"
      exit 1
    fi

    echo "🔧 Importing GCP certificates into JVM truststore"
    JAVA_HOME=$(readlink -f /usr/bin/java | sed "s:bin/java::")
    CACERTS_PATH="$JAVA_HOME/lib/security/cacerts"
    cp "$CACERTS_PATH" "$CACERTS_PATH.backup" || true
    cert_count=0
    csplit -f cert- maven-certificates.pem '/-----BEGIN CERTIFICATE-----/' '{*}' 2>/dev/null || true
    for cert_file in cert-*; do
      if [ -s "$cert_file" ] && grep -q "BEGIN CERTIFICATE" "$cert_file"; then
        cert_count=$((cert_count + 1))
        keytool -import -noprompt -trustcacerts \
          -alias "gcp-cert-$cert_count" -file "$cert_file" \
          -keystore "$CACERTS_PATH" -storepass changeit 2>/dev/null || true
      fi
    done
    rm -f cert-*
    echo "✅ $cert_count certificates imported into JVM truststore"

    echo "🔧 Hiding Maven Wrapper to force system Maven"
    test -f mvnw     && mv mvnw     mvnw.hidden     || true
    test -f mvnw.cmd && mv mvnw.cmd mvnw.cmd.hidden || true
    test -d .mvn     && mv .mvn     .mvn.hidden     || true

    echo "🔧 Configuring MAVEN_OPTS"
    MAVEN_OPTS="-Dmaven.repo.local=.m2/repository"
    MAVEN_OPTS="$MAVEN_OPTS -Dcom.sun.net.ssl.checkRevocation=false"  # CRL endpoints may be unreachable from CI
    export MAVEN_OPTS

pack-build:
  extends: .build
  stage: build
  rules:
    - if: $JAVA_NATIVE_DYNATRACE == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 4Gi
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: 10Gi
  script:
    - *normalize_base_path
    - *manage_native_maven_profile
    - echo "🧹 Cleaning Maven cache before build..."
    - find .m2/repository -name "*.lastUpdated" -delete 2>/dev/null || true
    - find .m2/repository -type f -mtime +30 -delete 2>/dev/null || true
    - du -sh .m2/repository 2>/dev/null || echo "Maven cache directory does not exist yet"
    - echo "⚙️ Building with Cloud Build and buildpacks (inline configuration)"
    - echo "🏗️ Image = europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker/$IMAGE_NAME:$IMAGE_TAG"
    - |
      # Create inline Cloud Build configuration
      cat << 'EOF' > cloudbuild-inline.yaml
      substitutions:
        _PACK_IMAGE: '${PACK_IMAGE}'
        _BP_BUILDER_IMAGE: '${BP_BUILDER_IMAGE}'
        _BP_RUN_IMAGE: '${BP_RUN_IMAGE}'
        _BP_LIFECYCLE_IMAGE: '${BP_LIFECYCLE_IMAGE}'
        _IMAGE_REGISTRY: 'europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker'
        _IMAGE_NAME: '${IMAGE_NAME}'
        _IMAGE_TAG: '${IMAGE_TAG}'
        _CLOUD_SDK_IMAGE: '${CLOUD_SDK_IMAGE}'
        _GCP_MAVEN_DOMAIN: 'europe-maven.pkg.dev'
        _JAVA_VERSION: '${JAVA_VERSION}'
        _BP_NATIVE_IMAGE_FLAG: '${JAVA_NATIVE_BUILD}'
        _MAVEN_ADDITIONAL_BUILD_ARGUMENTS: '${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS}'
        _BP_MAVEN_BUILT_MODULE: '${BP_MAVEN_BUILT_MODULE}'
        _MAVEN_KEY_STORE_PARAMS: '-Djavax.net.ssl.trustStore=${NORMALIZED_BASE_PATH}src/main/resources/keystore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12 -Dcom.sun.net.ssl.checkRevocation=false -Dtrust_all_cert=true'

      steps:
        # Setup OAuth token and certificates with enhanced certificate handling
        - name: '${_CLOUD_SDK_IMAGE}'
          id: 'Setup maven authentication and SSL certificates'
          entrypoint: 'bash'
          args:
            - '-c'
            - |
              set -e  # Exit on any error
              
              # Get GCP Maven repository certificates
              openssl s_client -showcerts -connect ${_GCP_MAVEN_DOMAIN}:443 -servername ${_GCP_MAVEN_DOMAIN} < /dev/null 2>/dev/null | sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' > gcp-maven-certs.pem
              
              # Get Google's root certificates
              curl -s https://pki.goog/roots.pem >> gcp-maven-certs.pem 2>/dev/null || true
              
              # Find Java installation
              JAVA_HOME=$$(readlink -f /usr/bin/java | sed "s:bin/java::")
              CACERTS_PATH="$$JAVA_HOME/lib/security/cacerts"
              CUSTOM_TRUSTSTORE="/workspace/src/main/resources/keystore.p12"
              
              # Backup original keystores
              cp "$$CACERTS_PATH" "$$CACERTS_PATH.backup" || true
              
              # Import certificates into system truststore
              csplit -f cert- gcp-maven-certs.pem '/-----BEGIN CERTIFICATE-----/' '{*}' 2>/dev/null || true
              
              cert_count=0
              for cert_file in cert-*; do
                if [ -s "$$cert_file" ] && grep -q "BEGIN CERTIFICATE" "$$cert_file"; then
                  cert_count=$$((cert_count + 1))
                  # Import to system truststore
                  keytool -import -noprompt -trustcacerts -alias "gcp-cert-$$cert_count" -file "$$cert_file" -keystore "$$CACERTS_PATH" -storepass changeit 2>/dev/null || true
                  # Also import to custom truststore if it exists
                  if [ -f "$$CUSTOM_TRUSTSTORE" ]; then
                    keytool -import -noprompt -trustcacerts -alias "gcp-cert-$$cert_count" -file "$$cert_file" -keystore "$$CUSTOM_TRUSTSTORE" -storepass changeit 2>/dev/null || true
                  fi
                fi
              done
              
              # Test connectivity to Maven repository
              timeout 30s openssl s_client -connect ${_GCP_MAVEN_DOMAIN}:443 -servername ${_GCP_MAVEN_DOMAIN} -verify 8 < /dev/null || echo "⚠️  Certificate verification test completed"
              
              # Generate OAuth token and inject into settings.xml
              OAUTH_TOKEN=$$(gcloud auth print-access-token)
              
              # Replace the $$OAUTH_TOKEN placeholder with the actual token
              sed -i "s/\$$\$$OAUTH_TOKEN/$$OAUTH_TOKEN/g" settings.xml
              
              # Clean up certificate files
              rm -f cert-* gcp-maven-certs.pem

        # Hide Maven Wrapper files to force system Maven usage
        - name: '${_CLOUD_SDK_IMAGE}'
          id: 'Hide Maven Wrapper'
          entrypoint: 'bash'
          args:
            - '-c'
            - |
              echo "🔧 Temporarily hiding Maven Wrapper to force system Maven usage"
              test -f mvnw && mv mvnw mvnw.hidden || true
              test -f mvnw.cmd && mv mvnw.cmd mvnw.cmd.hidden || true  
              test -d .mvn && mv .mvn .mvn.hidden || true

        # Build with pack
        - name: '${_PACK_IMAGE}'
          id: 'Build with buildpacks'
          env:
            - 'DOCKER_API_VERSION=1.41'
          args:
            - 'build'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
            - '--path'
            - '.'
            - '--tag'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}:latest'
            - '--builder'
            - '${_BP_BUILDER_IMAGE}'
            - '--lifecycle-image'
            - '${_BP_LIFECYCLE_IMAGE}'
            - '--run-image'
            - '${_BP_RUN_IMAGE}'
            - '--trust-builder'
            - '--cache-image'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}-cache:latest'
            - '--env'
            - 'BP_EMBED_CERTS=true'
            - '--env'
            - 'BP_MAVEN_BUILT_MODULE=${_BP_MAVEN_BUILT_MODULE}'
            - '--env'
            - 'BP_JVM_VERSION=${_JAVA_VERSION}'
            - '--env'
            - 'BP_MAVEN_BUILD_ARGUMENTS=package ${_MAVEN_ADDITIONAL_BUILD_ARGUMENTS} ${_MAVEN_KEY_STORE_PARAMS} -Dmaven.test.skip=true -Dfmt.skip=true -Dspotless.check.skip=true --no-transfer-progress --settings settings.xml'
            - '--env'
            - 'BP_NATIVE_IMAGE=${_BP_NATIVE_IMAGE_FLAG}'
            - '--env'
            - 'BP_MAVEN_DAEMON_ENABLED=false'
            - '--env'
            - 'BP_NATIVE_IMAGE_BUILD_ARGUMENTS=--no-fallback -J-Xmx16g -J-XX:MaxDirectMemorySize=1g -H:+AddAllCharsets -H:+RemoveUnusedSymbols --static --libc=musl'
            - '--env'
            - 'MAVEN_OPTS=-Xmx16g -XX:MaxDirectMemorySize=1g'
            - '--publish'
            - '--report-output-dir'
            - '.'

        # Pull image back locally so Cloud Build can reference it in images: for SLSA attestation
        - name: 'gcr.io/cloud-builders/docker'
          id: 'Pull image for SLSA attestation'
          args:
            - 'pull'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}'

      images:
        - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}'

      options:
        env:
          - 'DOCKER_BUILDKIT=1'
        machineType: 'E2_HIGHCPU_32'
        requestedVerifyOption: VERIFIED
        substitutionOption: 'ALLOW_LOOSE'
        
      timeout: '3600s'
      EOF
    - gcloud --project=${GCP_PROJECT_ID} builds submit
        --config cloudbuild-inline.yaml --region ${LCL_REGION}
        --default-buckets-behavior=regional-user-owned-bucket
        --substitutions=_PACK_IMAGE="${PACK_IMAGE},_CLOUD_SDK_IMAGE=${CLOUD_SDK_IMAGE},_BP_BUILDER_IMAGE=${BP_BUILDER_IMAGE},_BP_LIFECYCLE_IMAGE=${BP_LIFECYCLE_IMAGE},_BP_RUN_IMAGE=${BP_RUN_IMAGE},_IMAGE_NAME=${IMAGE_NAME},_IMAGE_TAG=${IMAGE_TAG},_IMAGE_REGISTRY=europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker,_JAVA_VERSION=${JAVA_VERSION},_BP_NATIVE_IMAGE_FLAG=${JAVA_NATIVE_BUILD},_MAVEN_ADDITIONAL_BUILD_ARGUMENTS=${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS},_BP_MAVEN_BUILT_MODULE=${BP_MAVEN_BUILT_MODULE}"
    - echo "📄 Extracting image digest..."
    - |
      # Extract digest using gcloud
      IMAGE_FULL_NAME="europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker/$IMAGE_NAME:$IMAGE_TAG"
      # Get digest from Artifact Registry
      DIGEST=$(gcloud container images describe $IMAGE_FULL_NAME --format='value(image_summary.digest)' 2>/dev/null || echo "")
      # Create digest.env file
      echo "DIGEST=@${DIGEST}" | tee digest.env
      echo "TAG=:${IMAGE_TAG}" | tee -a digest.env
      echo "IMAGE_FULL_NAME=${IMAGE_FULL_NAME}" | tee -a digest.env
      echo "✅ Using digest: $DIGEST"
    - echo "🧹 Cleaning up temporary Cloud Build config"
    - rm -f cloudbuild-inline.yaml
  cache: {}
  artifacts:
    reports:
      dotenv: digest.env

native-dynatrace-build:
  stage: build
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 4Gi
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: 10Gi
  needs:
    - job: prepare-config
      artifacts: true
  script:
    - echo "Image = europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker/$IMAGE_NAME:$IMAGE_TAG"
    - |
      cat << 'DOCKERFILE_EOF' > Dockerfile.native-dynatrace
      ARG MAVEN_IMAGE
      ARG NATIVE_BUILD_IMAGE
      ARG NATIVE_RUN_IMAGE
      FROM ${MAVEN_IMAGE} AS maven
      FROM ${NATIVE_BUILD_IMAGE} AS build
      ARG CI_PROJECT_NAME
      COPY --from=maven /usr/share/maven /opt/maven
      ENV PATH="/opt/maven/bin:${PATH}"
      WORKDIR /build
      COPY . .
      RUN --mount=type=secret,id=mvnsettings,target=/build/settings-ci.xml \
          mvn -B -ntp -DskipTests -Pnative -Pdynatrace-native \
              --settings /build/settings-ci.xml package native:compile-no-fork
      RUN set -eu; \
          actual=$(stat -c %s ./target/${CI_PROJECT_NAME} 2>/dev/null || echo 0); \
          [ "$actual" -gt 52428800 ] || { echo "Binary too small or missing (${actual} bytes) - native compile failed"; exit 1; }; \
          echo "Binary validated: ${actual} bytes"; \
          install -D -m 0755 ./target/${CI_PROJECT_NAME} /out/application; \
          cp -r ./target/dynatrace /out/dynatrace
      FROM ${NATIVE_RUN_IMAGE} AS runtime
      WORKDIR /workspace
      COPY --from=build /out/application /workspace/application
      COPY --from=build /out/dynatrace /workspace/dynatrace
      USER 1000
      ENTRYPOINT ["/workspace/application"]
      DOCKERFILE_EOF
    - |
      cat << 'EOF' > cloudbuild-inline.yaml
      substitutions:
        _IMAGE_REGISTRY: 'europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker'
        _IMAGE_NAME: '${IMAGE_NAME}'
        _IMAGE_TAG: '${IMAGE_TAG}'
        _MAVEN_IMAGE: '${MAVEN_IMAGE}'
        _NATIVE_BUILD_IMAGE: '${NATIVE_BUILD_IMAGE}'
        _NATIVE_RUN_IMAGE: '${NATIVE_RUN_IMAGE}'
      steps:
        - name: 'gcr.io/cloud-builders/docker'
          id: 'Build native image with Dynatrace agent'
          entrypoint: 'bash'
          args:
            - '-c'
            - |
              set -e
              docker build \
                --build-arg MAVEN_IMAGE=${_MAVEN_IMAGE} \
                --build-arg NATIVE_BUILD_IMAGE=${_NATIVE_BUILD_IMAGE} \
                --build-arg NATIVE_RUN_IMAGE=${_NATIVE_RUN_IMAGE} \
                --build-arg CI_PROJECT_NAME=${_CI_PROJECT_NAME} \
                --secret id=mvnsettings,src=settings-configured.xml \
                -f Dockerfile.native-dynatrace \
                -t ${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG} \
                -t ${_IMAGE_REGISTRY}/${_IMAGE_NAME}:latest \
                .
              docker push ${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
              docker push ${_IMAGE_REGISTRY}/${_IMAGE_NAME}:latest
      images:
        - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
      options:
        env:
          - 'DOCKER_BUILDKIT=1'
        machineType: 'E2_HIGHCPU_32'
        requestedVerifyOption: VERIFIED
        substitutionOption: 'ALLOW_LOOSE'
      timeout: '3600s'
      EOF
    - gcloud --project=${GCP_PROJECT_ID} builds submit
        --config cloudbuild-inline.yaml --region ${LCL_REGION}
        --default-buckets-behavior=regional-user-owned-bucket
        --substitutions=_IMAGE_NAME=${IMAGE_NAME},_IMAGE_TAG=${IMAGE_TAG},_IMAGE_REGISTRY=europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker,_MAVEN_IMAGE=${MAVEN_IMAGE},_NATIVE_BUILD_IMAGE=${NATIVE_BUILD_IMAGE},_NATIVE_RUN_IMAGE=${NATIVE_RUN_IMAGE},_CI_PROJECT_NAME=${CI_PROJECT_NAME}
    - |
      IMAGE_FULL_NAME="europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker/$IMAGE_NAME:$IMAGE_TAG"
      DIGEST=$(gcloud container images describe $IMAGE_FULL_NAME --format='value(image_summary.digest)' 2>/dev/null || echo "")
      echo "DIGEST=@${DIGEST}" | tee digest.env
      echo "TAG=:${IMAGE_TAG}" | tee -a digest.env
      echo "IMAGE_FULL_NAME=${IMAGE_FULL_NAME}" | tee -a digest.env
    - rm -f cloudbuild-inline.yaml Dockerfile.native-dynatrace
  cache: {}
  artifacts:
    reports:
      dotenv: digest.env
  rules:
    - if: $JAVA_NATIVE_DYNATRACE != "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

sign-build:
  stage: build
  needs:
    - job: pack-build
      optional: true
      artifacts: true
    - job: native-dynatrace-build
      optional: true
      artifacts: true
  variables:
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 2Gi
  script:
    - echo "⚙️ Building with Cloud Build and buildpacks (inline configuration)"
    - echo "🏗️ Image = europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker/$IMAGE_NAME:$IMAGE_TAG"
    - eval "LCL_PROJECT_NAME=\$LCL_CI_${CI_PROJECT_NAMESPACE_ID}_PROJECT_NAME"
    - |
      # Create inline Cloud Build configuration
      cat << 'EOF' > cloudbuild-inline.yaml
      substitutions:
        _IMAGE_REGISTRY: 'europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker'
        _IMAGE_NAME: '${IMAGE_NAME}'
        _IMAGE_TAG: '${IMAGE_TAG}'
        _DIGEST: '${DIGEST}'
        _COSIGN_IMAGE: '${COSIGN_IMAGE}'
        _CLOUD_SDK_IMAGE: '${CLOUD_SDK_IMAGE}'
        _LCL_PROJECT_ID: '${LCL_PROJECT_ID}'
        _LCL_PROJECT_NAME: '${LCL_PROJECT_NAME}'

      steps:
        - name: '${_CLOUD_SDK_IMAGE}'
          id: 'Upload SBOM to Artifact Registry'
          entrypoint: 'bash'
          args:
            - '-c'
            - |
              echo "📤 Uploading SBOM to Artifact Registry..."
              gcloud artifacts sbom export --uri="${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}"
              echo "✅ SBOM uploaded to Artifact Registry"

        # Sign image with Cosign using KMS
        - name: '${_COSIGN_IMAGE}'
          id: 'Sign image with Cosign KMS'
          entrypoint: 'cosign'
          args:
            - 'sign'
            - '--key'
            - 'gcpkms://projects/${_LCL_PROJECT_ID}/locations/europe/keyRings/namespaces/cryptoKeys/cosign-${_LCL_PROJECT_NAME}/cryptoKeyVersions/1'
            - '--yes'
            - '--tlog-upload=false'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}${_DIGEST}'

        # Verify signature and display details
        - name: '${_COSIGN_IMAGE}'
          id: 'Verify Cosign signature'
          entrypoint: 'cosign'
          args:
            - 'verify'
            - '--key'
            - 'gcpkms://projects/${_LCL_PROJECT_ID}/locations/europe/keyRings/namespaces/cryptoKeys/cosign-${_LCL_PROJECT_NAME}/cryptoKeyVersions/1'
            - '--insecure-ignore-tlog'
            - '--output=text'
            - '${_IMAGE_REGISTRY}/${_IMAGE_NAME}${_DIGEST}'

      options:
        env:
          - 'DOCKER_BUILDKIT=1'
        machineType: 'E2_HIGHCPU_8'
        logging: CLOUD_LOGGING_ONLY
        substitutionOption: 'ALLOW_LOOSE'
        
      timeout: '3600s'
      EOF
    - gcloud --project=${GCP_PROJECT_ID} builds submit
        --config cloudbuild-inline.yaml --region ${LCL_REGION}
        --service-account=projects/${GCP_PROJECT_ID}/serviceAccounts/cloudbuild@${GCP_PROJECT_ID}.iam.gserviceaccount.com
        --substitutions=_CLOUD_SDK_IMAGE=${CLOUD_SDK_IMAGE},_IMAGE_NAME=${IMAGE_NAME},_DIGEST=${DIGEST},_IMAGE_TAG=${IMAGE_TAG},_IMAGE_REGISTRY=europe-docker.pkg.dev/${GCP_PROJECT_ID}/docker,_COSIGN_IMAGE=${COSIGN_IMAGE},_LCL_PROJECT_ID=${LCL_PROJECT_ID},_LCL_PROJECT_NAME=${LCL_PROJECT_NAME}
    - rm -f cloudbuild-inline.yaml

maven-install:
  extends: .cache
  cache:
    policy: pull-push
  stage: build
  needs: ["prepare-config"]
  image: ${MAVEN_IMAGE}
  script:
    - echo "📁 Copying built artifact from previous job"
    - *normalize_base_path
    - *manage_native_maven_profile
    - echo "🧪 Running Maven install with prepared configuration"
    - *maven_auth_setup
    - mvn install --settings settings-configured.xml -Dfmt.skip=true -Dspotless.check.skip=true ${MAVEN_BUILD_ADDITIONAL_BUILD_ARGUMENTS}
  artifacts:
    paths:
      - target/
      - target/classes/
      - ${NORMALIZED_BASE_PATH}target/
      - ${NORMALIZED_BASE_PATH}target/classes/
    when: always
    expire_in: 1 week

prepare-config:
  extends: .build
  stage: build
  image: ${CLOUD_SDK_IMAGE}
  script:
    - |
      set -e
      echo "🔧 Fetching GCP Artifact Registry SSL certificates"
      openssl s_client -showcerts \
        -connect ${GCP_MAVEN_DOMAIN}:443 -servername ${GCP_MAVEN_DOMAIN} \
        < /dev/null 2>/dev/null \
        | sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' > maven-certificates.pem
      curl -sf https://pki.goog/roots.pem >> maven-certificates.pem || true
      echo "✅ Certificates saved to maven-certificates.pem"

      echo "🔧 Generating OAuth token and configuring Maven settings"
      OAUTH_TOKEN=$(gcloud auth print-access-token)
      sed "s/\$\$OAUTH_TOKEN/$OAUTH_TOKEN/g" settings.xml > settings-configured.xml
      echo "✅ settings-configured.xml ready"
  artifacts:
    paths:
      - settings-configured.xml
      - maven-certificates.pem
    expire_in: 1 hour

test:
  extends: .build
  stage: test
  needs: ["prepare-config", "maven-install"]
  image: ${MAVEN_IMAGE}
  script:
    - echo "🧪 Running tests with prepared Maven configuration"
    - *maven_auth_setup
    - echo "🚀 Running Maven test"
    - mvn test --settings settings-configured.xml -Dfmt.skip=true -Dspotless.check.skip=true ${MAVEN_TEST_ADDITIONAL_BUILD_ARGUMENTS}
  artifacts:
    reports:
      junit:
        - ${NORMALIZED_BASE_PATH}target/surefire-reports/TEST-*.xml
    paths:
      - ${NORMALIZED_BASE_PATH}target/
      - ${NORMALIZED_BASE_PATH}target/site/
      - ${NORMALIZED_BASE_PATH}target/site/jacoco/
      - ${NORMALIZED_BASE_PATH}target/surefire-reports/
      - ${NORMALIZED_BASE_PATH}target/classes/
      - ${NORMALIZED_BASE_PATH}target/test-classes/
    when: always
    expire_in: 1 week

sonar:
  <<: *build_rules
  stage: quality
  extends: .cache
  cache:
    policy: pull
  needs: ["prepare-config", "test", "maven-install"]
  image: ${SONAR_IMAGE}
  variables:
    APP_BASE_NAME: "${CI_PROJECT_NAME}"
    GIT_DEPTH: 0  # Tells git to fetch all the branches of the project, required by the analysis task
  script:
    - *normalize_base_path
    - echo "🔍 Starting SonarQube LCL analysis with external server"
    - echo "🌐 Using SonarQube server ${SONAR_URL}"
    - echo "CI_PROJECT_NAME=$CI_PROJECT_NAME"
    - echo "CI_PROJECT_TITLE=$CI_PROJECT_TITLE"
    - echo "SONAR_PROJECT_CODE=$SONAR_PROJECT_CODE"
    - |
      # Check if sonar-project.properties exists, create it if not
      if [ -f "sonar-project.properties" ]; then
        echo "📋 Existing sonar-project.properties file found"
        
        echo "🔧 Resolving variables in existing configuration file"
            
        # Create a temporary file with resolved variables
        cp sonar-project.properties sonar-project.properties.backup
        
        # Replace variables with their actual values, preserving the rest of the config
        sed -i.tmp "s|\${SONAR_URL}|${SONAR_URL}|g" sonar-project.properties
        sed -i.tmp "s|\${SONAR_LOGIN}|${SONAR_LOGIN}|g" sonar-project.properties
        sed -i.tmp "s|\${SONAR_PROJECT_CODE}|${SONAR_PROJECT_CODE}|g" sonar-project.properties
        sed -i.tmp "s|\${APP_BASE_NAME}|${APP_BASE_NAME}|g" sonar-project.properties
        sed -i.tmp "s|\${CI_PROJECT_NAME}|${CI_PROJECT_NAME}|g" sonar-project.properties
        
        # Clean up temp files
        rm -f sonar-project.properties.tmp sonar-project.properties.backup
        
        echo "✅ Variables resolved in existing file"
        echo "📋 Updated content preview:"
        head -5 sonar-project.properties || echo "  Unable to preview updated content"
        
      else
        echo "📝 Creating SonarQube LCL configuration"
        cat > sonar-project.properties << EOF
      sonar.host.url=${SONAR_URL}
      sonar.token=${SONAR_LOGIN}
      sonar.sourceEncoding=UTF-8
      sonar.projectKey=com.lcl.${SONAR_PROJECT_CODE}.${APP_BASE_NAME}
      sonar.projectName=${APP_BASE_NAME}
      sonar.sources=${NORMALIZED_BASE_PATH}src/main/java
      sonar.tests=${NORMALIZED_BASE_PATH}src/test/java
      sonar.java.binaries=${NORMALIZED_BASE_PATH}target/classes
      # sonar.java.test.binaries=${NORMALIZED_BASE_PATH}target/test-classes
      sonar.coverage.jacoco.xmlReportPaths=${NORMALIZED_BASE_PATH}target/site/jacoco/jacoco.xml
      sonar.junit.reportPaths=${NORMALIZED_BASE_PATH}target/surefire-reports
      sonar.java.source=${JAVA_VERSION}
      sonar.exclusions=**/*Test.java,**/*Tests.java
      EOF
      fi
      
    - |
      echo "🚀 Running SonarQube analysis"
      sonar-scanner -Dproject.settings=sonar-project.properties
    - |
      echo "✅ SonarQube HTML report generated at sonar-report.html"
      echo "📊 SonarQube analysis completed successfully"
      if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then
        echo "🔗 View results at: ${SONAR_URL}/dashboard?pullRequest=${CI_MERGE_REQUEST_IID}&id=com.lcl.${SONAR_PROJECT_CODE}.${APP_BASE_NAME}"
      else
        echo "🔗 View results at: ${SONAR_URL}/dashboard?branch=${CI_COMMIT_BRANCH}&id=com.lcl.${SONAR_PROJECT_CODE}.${APP_BASE_NAME}"
      fi
  tags:
    - buildpacks
  allow_failure: true

trivy-scan:
  extends: .trivy-scan-template
  <<: *build_rules
  needs:
    - job: pack-build
      optional: true
      artifacts: true
    - job: native-dynatrace-build
      optional: true
      artifacts: true
    - job: test

lint:
  <<: *build_rules
  stage: quality
  image: ${MAVEN_IMAGE}
  needs: ["prepare-config", "test"]
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .m2/repository
    policy: pull
  script:
    - echo "🔍 Running code linting with Spotless"
    - *maven_auth_setup
    - mvn spotless:check --settings settings-configured.xml -Dfmt.skip=true
  allow_failure: true

# =============================================================================
# GITLEAKS - Détection de secrets
# =============================================================================
# Filet de sécurité en complément du push protection GitLab (au cas où il aurait
# été désactivé / mal configuré). Deux étapes :
#   1. Dernier commit  -> analyse stricte, BLOQUANTE (le pipeline échoue).
#   2. Historique      -> mode warning (non bloquant) + rapport, pour inciter
#      les squads à renouveler (rotation) les anciens secrets leakés.
# Après rotation, un secret peut être ajouté au .gitleaksignore (lu
# automatiquement par gitleaks) pour ne plus être signalé.
gitleaks:
  <<: *build_rules
  stage: test
  image:
    name: ${GITLEAKS_IMAGE}
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0 # historique complet requis pour l'étape 2
  script:
    - echo "🔐 Étape 1 - analyse stricte du dernier commit (BLOQUANT)"
    - |
      # gitleaks v8 n'a pas de --commit-range : on passe la plage via --log-opts.
      if git rev-parse --verify -q HEAD~1 >/dev/null; then
        RANGE="HEAD~1..HEAD"
      else
        # Dépôt à un seul commit : pas de parent, on analyse le commit initial
        RANGE="$(git rev-list --max-parents=0 HEAD | tail -1)..HEAD"
      fi
      echo "🔍 Plage analysée : ${RANGE}"
      gitleaks detect --source . --log-opts "${RANGE}" --redact --verbose
    - echo "✅ Aucun nouveau secret détecté dans le dernier commit."
    - echo "---------------------------------------------------------"
    - echo "🔎 Étape 2 - analyse de l'historique (mode warning, non bloquant)"
    - |
      # --exit-code 0 : ne casse jamais le pipeline sur l'historique.
      gitleaks detect --source . --redact --verbose \
        --exit-code 0 \
        --report-format json \
        --report-path gitleaks-history-report.json
    - echo "✅ Analyse de l'historique terminée. Rapport gitleaks-history-report.json"
    - echo "💡 Secrets présents dans l'historique - à renouveler (rotation), puis à ajouter au .gitleaksignore."
  artifacts:
    when: always # rapport conservé même si l'étape 1 a fait échouer le job
    expire_in: 1 week
    paths:
      - gitleaks-history-report.json

# =============================================================================
# LICENCES OPEN SOURCE - Conformité (ACDC-859)
# =============================================================================
# Scan Trivy (--scanners license) sur les dépendances Maven. Classification par
# catégories natives Trivy (forbidden -> CRITICAL bloquant, restricted -> HIGH
# tracé). Blocage différencié par branche + SBOM CycloneDX.
# NB1 : le scanner de licences utilise le classifier embarqué → --skip-db-update.
# NB2 : policy écrite INLINE (heredoc), comme le .trivyignore du composant Trivy,
#       car le job tourne dans le checkout du projet consommateur.
# NB3 : SCAN_PATH="." + cache .m2 pull (needs maven-install) pour que Trivy voie
#       les JAR des dépendances et en lise les licences.
.license-base:
  stage: quality
  extends: .cache
  needs: ["maven-install"]
  image:
    name: ${TRIVY_IMAGE}
    entrypoint: [""]
  variables:
    TRIVY_CONFIG: trivy-license.yaml
    TRIVY_TIMEOUT: 15m0s
    TRIVY_NO_PROGRESS: "true"
    SCAN_PATH: "."
  before_script:
    - echo "⚖️ Trivy - Scan de conformité des licences OSS (Maven)"
    - |
      # Policy de licences écrite inline (indisponible dans le repo consommateur)
      cat > trivy-license.yaml << 'TRIVY_LIC_EOF'
      scan:
        scanners:
          - license
      license:
        full: true
        # Copyleft fort -> bloquant (forbidden -> CRITICAL)
        forbidden:
          - GPL-2.0-only
          - GPL-2.0-or-later
          - GPL-3.0-only
          - GPL-3.0-or-later
          - AGPL-3.0-only
          - AGPL-3.0-or-later
          - SSPL-1.0
          - EUPL-1.1
          - EUPL-1.2
        # Copyleft faible -> tracé, non bloquant (restricted -> HIGH)
        restricted:
          - LGPL-2.1-only
          - LGPL-3.0-only
          - MPL-2.0
          - EPL-1.0
          - EPL-2.0
          - CDDL-1.0
        # Permissives explicitement autorisées
        permissive:
          - MIT
          - Apache-2.0
          - BSD-2-Clause
          - BSD-3-Clause
          - ISC
      TRIVY_LIC_EOF
    - trivy fs --scanners license --skip-db-update --format table --output license-report.txt "${SCAN_PATH}"
    - trivy fs --scanners license --skip-db-update --format cyclonedx --output license-sbom.cdx.json "${SCAN_PATH}"
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      cyclonedx: license-sbom.cdx.json
    paths:
      - license-sbom.cdx.json
      - license-report.txt

# --- Branche par défaut : blocage dur sur copyleft fort (forbidden -> CRITICAL) ---
license-check-blocking:
  extends: .license-base
  script:
    - echo "🔒 Gate bloquant - echec si licence forbidden detectee (GPL/AGPL/SSPL/EUPL)"
    - trivy fs --scanners license --skip-db-update --severity CRITICAL --exit-code 1 "${SCAN_PATH}"
    - echo "✅ Aucune licence interdite détectée"
  rules:
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

# --- MR / feature / prototypage : avertissement non bloquant ---
license-check-warn:
  extends: .license-base
  script:
    - echo "⚠️ Gate non bloquant (MR/feature) - licences interdites signalées sans casser la pipeline"
    - trivy fs --scanners license --skip-db-update --severity CRITICAL,HIGH --exit-code 0 "${SCAN_PATH}"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never

flux:
  stage: deploy
  image: ${DEPLOY_TOOLS_IMAGE}
  script:
    - |-
      if [ -z "${DIGEST}" ]
      then DIGEST=":latest"
      fi
    - cd ${CI_PROJECT_DIR}/k8s-manifests/base
    - kustomize edit add annotation gitlab.com/ci-pipeline-url:${CI_PIPELINE_URL}
    - kustomize edit set image image-to-be-templated=europe-docker.pkg.dev/\${LCL_NAMESPACE_PROJECT_ID}/docker/${CI_PROJECT_NAME}${DIGEST}
    - cd ${CI_PROJECT_DIR}/k8s-manifests
    - find . -exec touch -t 197001010000.00 '{}' \;
    # --provider gcp : flux s'authentifie via l'identité du runner (Workload Identity),
    - flux push artifact
      oci://europe-docker.pkg.dev/${GCP_PROJECT_ID}/oci-dev/${CI_PROJECT_NAME}
      --source="${CI_PROJECT_URL}"
      --revision="${CI_COMMIT_REF_SLUG}@sha1:${CI_COMMIT_SHA}"
      --path .
      --reproducible
      --provider gcp
      --output json | tee /tmp/output.json
    - FLUX_DIGEST=$(jq -r .digest /tmp/output.json)
    - echo "FLUX_DIGEST=@$FLUX_DIGEST" >> ${CI_PROJECT_DIR}/flux_digest.env
    - echo "✅ Flux artifact pushed with digest = $FLUX_DIGEST"
  artifacts:
    reports:
      dotenv: flux_digest.env
  needs:
    - job: pack-build
      optional: true
      artifacts: true
    - job: native-dynatrace-build
      optional: true
      artifacts: true
    - job: sonar
    - job: lint
    - job: test
    - job: gitleaks
    - job: license-check-blocking
  rules:
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

.deployed:
  stage: deploy
  image: ${CLOUD_SDK_IMAGE}
  variables:
    GIT_STRATEGY: none
  script:
    - eval "CLUSTER_NAME=${LCL_GKE_CLUSTER_NAME}"
    - echo "LCL_NAMESPACE=${LCL_NAMESPACE}"
    - APP_HEALTH_URL="https://${CLUSTER_NAME}.${LCL_CI_ENV}.gcp.lcl.gca/${NAMESPACE}/${CI_PROJECT_NAME}/actuator/health"
    - |
      echo "🔍 Waiting for deployment to complete..."
      echo "📦 Application: ${CI_PROJECT_NAME}"
      echo "🌍 Environment: ${LCL_CI_ENV}"
      echo "🔖 Flux Digest: ${FLUX_DIGEST}"

      MAX_ATTEMPTS=60  # 10 minutes with 10s intervals
      ATTEMPT=0
      DEPLOYMENT_SUCCESS=false
      
      # Verification 1: Check GitLab commit status set by Flux (requires Flux to update commit status)
      echo "🔶 Verification 1: Check GitLab commit status set by Flux"
      eval "FLUX_TOKEN=\$flux_token_${LCL_CI_ENV}"
      # The API returns an error object (e.g. {"message":"401 ..."}) instead of an array
      # when the token is expired/revoked; guard with `if type=="array"` so this non-blocking
      # check degrades to a warning instead of crashing jq with "Cannot index string".
      status=$(curl -s --header "PRIVATE-TOKEN:${FLUX_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/statuses" | \
        jq -r 'if type=="array" then (.[] | select(.name == "Kustomization/'${CI_PROJECT_NAME}'/'${LCL_CI_ENV}'") | .status) else empty end' 2>/dev/null || true)
      if [ "$status" = "success" ]; then
        echo "✅ External event received"
      else
        echo "⚠️  External event not received - status: $status"
        echo "💡 Check Flux logs and GitLab commit statuses for details"
      fi

      # Verification 2: Verify OCI artifact digest in Artifact Registry
      echo "🔶 Verification 2: OCI Artifact Digest"
      echo "📦 OCI Registry: europe-docker.pkg.dev/${GCP_PROJECT_ID}/oci-dev/${CI_PROJECT_NAME}"
      echo "🔍 Verifying Flux artifact deployment..."

      while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
        ATTEMPT=$((ATTEMPT + 1))
        
        # Check if the Flux digest exists in Artifact Registry
        # NB : image = cloud-sdk (gcloud, PAS gcrane) → on liste les digests via gcloud.
        DEPLOYED_DIGEST=$(gcloud artifacts docker images list \
          "europe-docker.pkg.dev/${GCP_PROJECT_ID}/oci-dev/${CI_PROJECT_NAME}" \
          --format='value(version)' 2>/dev/null | \
          grep -F "${FLUX_DIGEST#@}" || echo "")
        
        if [ -n "$DEPLOYED_DIGEST" ]; then
          echo "✅ Flux artifact found in registry!"
          echo "  Digest: ${FLUX_DIGEST}"
          DEPLOYMENT_SUCCESS=true
          break
        fi
        
        if [ $((ATTEMPT % 3)) -eq 0 ]; then
          echo "[$(date '+%H:%M:%S')] Waiting for Flux artifact... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
        fi
        
        sleep 5
      done

      if [ "$DEPLOYMENT_SUCCESS" = "false" ]; then
        echo "⚠️  Artifact verification timeout - OCI artifact not found after 10 minutes"
        echo "  Expected digest: ${FLUX_DIGEST}"
        exit 1
      fi

      # Verification 3: Verify via application health check (readiness probe)
      echo "🔶 Verification 3: Application Health Check"
      if [ -z "$APP_HEALTH_URL" ]; then
        echo "⚠️  No health check URL configured - skipping application health verification"
        echo "💡 To enable health check verification, configure app_health_url_${LCL_CI_ENV} variable"
      else
        echo "🏥 Health check URL: ${APP_HEALTH_URL}"
        echo "🔍 Verifying application health (readiness probe)..."
        
        HEALTHY_CHECKS=0
        REQUIRED_HEALTHY_CHECKS=3  # Require 3 consecutive successful health checks
        HEALTH_ATTEMPT=0
        HEALTH_MAX_ATTEMPTS=30  # Additional 5 minutes for health checks
        
        while [ $HEALTH_ATTEMPT -lt $HEALTH_MAX_ATTEMPTS ]; do
          HEALTH_ATTEMPT=$((HEALTH_ATTEMPT + 1))
          
          # Call the health endpoint (same as readiness probe)
          # -k : l'ingress interne (*.gcp.lcl.gca) a une CA non connue de cloud-sdk ; timeouts pour éviter les hangs.
          HEALTH_RESPONSE=$(curl -sk --connect-timeout 5 --max-time 10 -w "\n%{http_code}" -X GET "${APP_HEALTH_URL}" 2>/dev/null || echo -e "\n000")
          HTTP_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
          HEALTH_BODY=$(echo "$HEALTH_RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "200" ]; then
            HEALTHY_CHECKS=$((HEALTHY_CHECKS + 1))
            
            # Try to parse JSON response for detailed status
            HEALTH_STATUS=$(echo "$HEALTH_BODY" | jq -r '.status // "up"' 2>/dev/null || echo "up")
            
            if [ $((HEALTH_ATTEMPT % 3)) -eq 0 ] || [ $HEALTHY_CHECKS -ge 1 ]; then
              echo "[$(date '+%H:%M:%S')] ✓ Health check passed ($HEALTHY_CHECKS/$REQUIRED_HEALTHY_CHECKS) - Status: $HEALTH_STATUS"
            fi
            
            if [ $HEALTHY_CHECKS -ge $REQUIRED_HEALTHY_CHECKS ]; then
              echo "✅ Application is healthy and ready!"
              echo "  Health checks: $HEALTHY_CHECKS/$REQUIRED_HEALTHY_CHECKS passed"
              echo "  HTTP Status: $HTTP_CODE"
              echo "  App Status: $HEALTH_STATUS"
              break
            fi
          else
            # Reset counter on failure
            if [ $HEALTHY_CHECKS -gt 0 ]; then
              echo "[$(date '+%H:%M:%S')] ✗ Health check failed (HTTP $HTTP_CODE) - resetting counter"
            fi
            HEALTHY_CHECKS=0
            
            if [ $((HEALTH_ATTEMPT % 3)) -eq 0 ]; then
              echo "[$(date '+%H:%M:%S')] Waiting for application readiness... (attempt $HEALTH_ATTEMPT/$HEALTH_MAX_ATTEMPTS, HTTP: $HTTP_CODE)"
            fi
          fi
          
          sleep 5
        done
        
        if [ $HEALTHY_CHECKS -lt $REQUIRED_HEALTHY_CHECKS ]; then
          echo "⚠️  Health check verification incomplete"
          echo "  Passed: $HEALTHY_CHECKS/$REQUIRED_HEALTHY_CHECKS"
          echo "  Last HTTP status: ${HTTP_CODE}"
          echo "💡 Application may still be starting. Check:"
          echo "  1. Pod status: kubectl get pods -l app=${CI_PROJECT_NAME}"
          echo "  2. Pod logs: kubectl logs -l app=${CI_PROJECT_NAME} --tail=50"
          echo "  3. Health endpoint: curl ${APP_HEALTH_URL}"
          echo "⚠️  Job completed with warning - please investigate health check failure"
          exit 1
        fi
      fi

      echo "✅ Deployment verification completed successfully!"
      echo "  Total time: $((ATTEMPT * 10)) seconds"
  timeout: 10m
  allow_failure: false # This MUST be a showstopper Flux can't deploy the OCI something is broken!
  cache: {}
  rules:
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

deployed-dev:
  extends: .deployed
  needs:
    - job: pack-build
      optional: true
    - job: native-dynatrace-build
      optional: true
    - job: flux
  rules:
    - if: $CI_PIPELINE_SOURCE =~ /^(push|schedule|web)$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $FORCE_DEV_DEPLOY == "true"
    - when: never

deployed-rec:
  extends: .deployed
  needs:
  - promote-rec
  # Hérite du dotenv FLUX_DIGEST (même digest de manifeste, préservé par gcrane copy)
  - job: flux
    artifacts: true
  tags:
  - easypart-rec
  rules:
